server {
    listen 80;
    server_name _;

    # Serve the static weather dashboard frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster frontend delivery
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Frontend — serve index.html for all routes (SPA-style)
    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy /api/* to the FastAPI backend
    # This avoids CORS issues when both are served on the same origin in production
    location /api/ {
        proxy_pass         http://fastapi:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        # Ensure we stay under <150ms SLA: short proxy timeouts
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Proxy /health to FastAPI health endpoint
    location /health {
        proxy_pass http://fastapi:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
